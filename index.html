<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE WORLD GUINNESS PHOTO NIG. LTD</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#001f5c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    color:#333;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#FFD700;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#ffcc00;
}

#error{
    color:red;
}
</style>

</head>
<body>

<div class="login-box">

<h2>DE WORLD GUINNESS</h2>
<p>Website Under Development</p>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

    const password="edcba"; // Change this to your own password

    if(document.getElementById("password").value===password){

        window.location.href="home.html";

    }else{

        document.getElementById("error").innerHTML="Incorrect password.";

    }

}

</script>

</body>
</html>
